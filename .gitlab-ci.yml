---
#######################################################################
# RSS feed builder pipeline                                           #
#                                                                     #
# On merge to main, if .raw/feeds.yml has changed, pipeline calls the #
# run-parser.sh script in the scripts/ directory and regenerates      #
# the output/feeds.opml file.                                         #
#######################################################################

image: alpine:latest

variables:
  FEEDS_FILE: ".raw/feeds.yml"
  OUTPUT_FILE: "feeds.opml"
  REQUEST_TIMEOUT: "10"
  REQUEST_RETRIES: "3"
  OPML_TITLE: "My RSS Feeds"

stages:
  - update
  - release

## Auto-update feeds OPML and create PR (automatic on main when .raw/feeds.yml changed)
update_feeds_opml_auto:
  stage: update
  image: python:3.14-alpine
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
      changes:
        - .raw/feeds.yml
    - when: never
  before_script:
    - apk add --no-cache git curl bash jq coreutils
  script:
    - chmod +x scripts/gitlab/update-feeds.sh
    - GITLAB_TOKEN="$GITLAB_TOKEN" GITLAB_HOST="$GITLAB_HOST" ./scripts/gitlab/update-feeds.sh
  artifacts:
    paths:
      - feeds.opml
      - .version
    expire_in: 1 day

## Manual update feeds OPML
update_feeds_opml_manual:
  stage: update
  image: python:3.14-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  before_script:
    - apk add --no-cache git curl bash jq coreutils
  script:
    - chmod +x scripts/gitlab/update-feeds.sh
    - GITLAB_TOKEN="$GITLAB_TOKEN" GITLAB_HOST="$GITLAB_HOST" ./scripts/gitlab/update-feeds.sh
  artifacts:
    paths:
      - feeds.opml
      - .version
    expire_in: 1 day

## Auto-create tagged release on changes to feed.opml file
create_release_auto:
  stage: release
  image: alpine:latest
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
      changes:
        - .raw/feeds.yml
        - feeds.opml
        - .version
    - when: never

  needs:
    - job: update_feeds_opml_auto
      artifacts: true
      optional: true

  before_script:
    - apk add --no-cache git bash curl jq

  script:
    - chmod +x scripts/gitlab/create-release.sh
    - GITLAB_TOKEN="$GITLAB_TOKEN" GITLAB_HOST="$GITLAB_HOST" ./scripts/gitlab/create-release.sh

## Manual run, ensure tag for current version and release for current tag
create_release_manual:
  stage: release
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual

  needs:
    - job: update_feeds_opml_manual
      artifacts: true
      optional: true

  before_script:
    - apk add --no-cache git bash curl jq

  script:
    - chmod +x scripts/gitlab/create-release.sh
    - GITLAB_TOKEN="$GITLAB_TOKEN" GITLAB_HOST="$GITLAB_HOST" ./scripts/gitlab/create-release.sh
