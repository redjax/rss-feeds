---
##################################################################
# RSS feed builder pipeline                                      #
#                                                                #
# On merge to main, if feeds.yml has changed, pipeline calls the #
# run-parser.sh script in the scripts/ directory and regenerates #
# the output/feeds.opml file.                                    #
##################################################################

image: alpine:latest

variables:
  FEEDS_FILE: "feeds.yml"
  OUTPUT_DIR: "output"
  OUTPUT_FILE: "feeds.opml"
  REQUEST_TIMEOUT: "10"
  REQUEST_RETRIES: "3"
  OPML_TITLE: "My RSS Feeds"

  GITLAB_TOKEN: "${GITLAB_TOKEN}"
  GITLAB_HOST: "${GITLAB_HOST}"

stages:
  - update

## Auto-update feeds OPML and create PR (automatic on main when feeds.yml changed)
update_feeds_opml_auto:
  stage: update
  image: python:3.14-alpine
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
      changes:
        - feeds.yml
    - when: never
  before_script:
    - apk add --no-cache git curl bash jq coreutils
    - export GITLAB_TOKEN="$GITLAB_TOKEN"
    - export GITLAB_HOST="$GITLAB_HOST"
  script:
    - chmod +x scripts/gitlab/update-feeds.sh
    - ./scripts/gitlab/update-feeds.sh

## Auto-update feeds OPML and create PR (manual trigger)
update_feeds_opml_manual:
  stage: update
  image: python:3.14-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  before_script:
    - apk add --no-cache git curl bash jq coreutils
    - export GITLAB_TOKEN="$GITLAB_TOKEN"
    - export GITLAB_HOST="$GITLAB_HOST"
  script:
    - chmod +x scripts/gitlab/update-feeds.sh
    - ./scripts/gitlab/update-feeds.sh
